<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stable Useradmin Login</title>
  <style>
    :root {
      --bg: #0f1014;
      --text: #e7e9f3;
      --muted: #a3a7b6;
      --accent: #cfd2ff;
      --accent-hover: #dfe2ff;
      --accent-text: #1e2345;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 5vw, 48px) clamp(16px, 5vw, 40px);
    }
    .login {
      text-align: center;
      width: min(420px, 100%);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(24px, 6vw, 28px);
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .subtitle {
      margin: 0 0 clamp(20px, 6vw, 32px);
      color: var(--muted);
      font-size: clamp(14px, 4vw, 15px);
      line-height: 1.6;
    }
    .github-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: min(360px, 100%);
      padding: clamp(12px, 3vw, 14px) clamp(16px, 4vw, 18px);
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      border-radius: 999px;
      font-weight: 650;
      font-size: clamp(15px, 4vw, 16px);
      text-decoration: none;
      box-shadow: 0 12px 35px rgba(115, 122, 255, 0.25);
      transition: background 0.15s ease, transform 0.12s ease, box-shadow 0.15s ease;
    }
    .github-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 14px 40px rgba(115, 122, 255, 0.28);
    }
    .github-btn:active {
      transform: translateY(0);
      box-shadow: 0 10px 30px rgba(115, 122, 255, 0.2);
    }
    .github-icon {
      width: clamp(20px, 5vw, 22px);
      height: clamp(20px, 5vw, 22px);
      fill: var(--accent-text);
    }

    @media (max-width: 480px) {
      .login {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="login">
    <h1>Stable Useradmin</h1>
    <p class="subtitle">Your routes at a glance.</p>
    <a
      class="github-btn"
      href="https://github.com/login/oauth/authorize?client_id=Ov23liy0AI1YCd15pypf&redirect_uri=https%3A%2F%2Fapi.konik.ai%2Fv2%2Fauth%2Fh%2Fredirect%2F&state=service%2Cuseradmin.konik.ai&scope=read%3Auser"
    >
      <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 2.01-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
      </svg>
      <span>Sign in with GitHub</span>
    </a>
  </main>
</body>
</html>
