<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Useradmin Login</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #181c20;
      color: #e3e6eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background: #23272e;
      color: #e3e6eb;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      padding: 32px 24px;
      margin-top: 10vh;
      min-width: 320px;
      max-width: 90vw;
      text-align: center;
    }
    h1 {
      color: #6cb6ff;
      margin-bottom: 16px;
      font-size: 1.5em;
    }
    a {
      color: #6cb6ff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1em;
      border: 1px solid #6cb6ff;
      border-radius: 4px;
      padding: 10px 24px;
      background: #181c20;
      transition: background 0.2s, color 0.2s;
      display: inline-block;
      margin-top: 16px;
    }
    a:hover {
      background: #6cb6ff;
      color: #181c20;
    }
    @media (max-width: 600px) {
      .login-container {
        padding: 18px 6px;
        min-width: unset;
      }
      h1 { font-size: 1.1em; }
      a { font-size: 1em; padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Connect Useradmin</h1>
    <a href="https://github.com/login/oauth/authorize?client_id=Ov23liy0AI1YCd15pypf&redirect_uri=https%3A%2F%2Fapi.konik.ai%2Fv2%2Fauth%2Fh%2Fredirect%2F&state=service%2Cuseradmin.konik.ai&scope=read%3Auser">
      Sign in with GitHub
    </a>
  </div>
</body>
</html>
